<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>
    <style>
        body {
            font-family: Arial;
            background: #f1f3f6;
        }

        h2 {
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            justify-content: center;
        }

        .card {
            width: 260px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            margin: 5px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .total {
            color: #000;
            font-weight: bold;
        }

        .delete-btn {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            border: none;
            background: #ff4d4d;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .grand-box {
            width: 100%;
            text-align: center;
            margin-top: 20px;
        }

        .grand-total {
            display: inline-block;
            background: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<h2>🛒 My Cart</h2>

<div class="container">

    {% for p in all_cart %}
        <div class="card">
            <h3>{{ p.name }}</h3>
            <p>{{ p.description }}</p>
            <p><b>Qty:</b> {{ p.quantity }}</p>
            <p class="price">₹{{ p.price }}</p>
            <p class="total">Total: ₹{{ p.item_total }}</p>

            <form action="{% url 'delete_cart_item' p.id %}" method="POST">
                {% csrf_token %}
                <button class="delete-btn">
                    Remove
                </button>

                <button class="delete-btn">
                    buy
                </button>
            </form>
        </div>
    {% endfor %}

</div>

<div class="grand-box">
    <div class="grand-total">
        Grand Total: ₹{{ grand_total }}
    </div>
</div>


</body>
</html>
